<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>body{margin:0;font-family:Inter,system-ui,sans-serif;background:#f5f7f8;color:#172126}.toolbar{padding:12px;background:white;border-bottom:1px solid #d8e0e3;display:flex;gap:10px;align-items:center;flex-wrap:wrap}.toolbar button{padding:8px 12px;border:1px solid #b9c6c1;border-radius:8px;background:#eef2f3;cursor:pointer}.toolbar button.active{background:#275d50;color:white}.card{background:white;margin:12px;border:1px solid #d8e0e3;border-radius:14px;padding:12px}.metrics{display:grid;grid-template-columns:repeat(3,minmax(120px,1fr));gap:9px}.metric{background:#eef2f3;padding:10px;border-radius:9px}.metric b{display:block;font-size:19px}svg{width:100%;height:auto}@media(max-width:650px){.metrics{grid-template-columns:1fr}}</style></head><body><div class="toolbar"><strong>Horizonte:</strong><div id="buttons"></div></div><div class="card"><div id="title"></div><svg viewBox="0 0 900 430"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#275d50"/></marker></defs><rect x="105" y="155" width="245" height="110" rx="24" fill="#eef2f3" stroke="#275d50" stroke-width="4"/><rect x="550" y="155" width="245" height="110" rx="24" fill="#dcebe5" stroke="#275d50" stroke-width="4"/><text x="228" y="195" text-anchor="middle" font-size="26" font-weight="800">Estado 0</text><text x="228" y="230" text-anchor="middle" font-size="20">Sin confirmación</text><text x="672" y="195" text-anchor="middle" font-size="26" font-weight="800">Estado 1</text><text x="672" y="230" text-anchor="middle" font-size="20">Confirmación</text><path d="M350 185 C430 115,470 115,550 185" fill="none" stroke="#275d50" stroke-width="5" marker-end="url(#arrow)"/><text id="p01" x="450" y="125" text-anchor="middle" font-size="21" font-weight="750"></text><path d="M550 245 C470 315,430 315,350 245" fill="none" stroke="#275d50" stroke-width="5" marker-end="url(#arrow)"/><text id="p10" x="450" y="345" text-anchor="middle" font-size="21" font-weight="750"></text><path d="M150 155 C70 60,310 20,315 150" fill="none" stroke="#8a5a00" stroke-width="5" marker-end="url(#arrow)"/><text id="p00" x="215" y="55" text-anchor="middle" font-size="21" font-weight="750"></text><path d="M585 150 C590 20,830 60,750 155" fill="none" stroke="#8a5a00" stroke-width="5" marker-end="url(#arrow)"/><text id="p11" x="685" y="55" text-anchor="middle" font-size="21" font-weight="750"></text></svg><div class="metrics"><div class="metric">Persistencia tras detectar<b id="m11"></b></div><div class="metric">Aparición tras no detectar<b id="m01"></b></div><div class="metric">Memoria P11 − P01<b id="mem"></b></div></div></div><script>const payload={"15 minutos": {"matrix": [[0.9999247556124997, 7.524438750023513e-05], [1.0, 0.0]], "counts": [[478405, 36], [36, 0]]}, "30 minutos": {"matrix": [[0.9999247425568298, 7.525744317017798e-05], [1.0, 0.0]], "counts": [[478322, 36], [36, 0]]}, "1 hora": {"matrix": [[0.9999268076421186, 7.319235788135309e-05], [0.9722222222222222, 0.027777777777777776]], "counts": [[478157, 35], [35, 1]]}, "2 horas": {"matrix": [[0.9999246641275688, 7.533587243125602e-05], [1.0, 0.0]], "counts": [[477824, 36], [36, 0]]}, "6 horas": {"matrix": [[0.999924454181461, 7.554581853894387e-05], [1.0, 0.0]], "counts": [[476496, 36], [36, 0]]}},labels=Object.keys(payload),buttons=document.getElementById('buttons');function pct(x){return Number.isFinite(x)?(100*x).toFixed(2)+' %':'NA'}function render(label){[...buttons.children].forEach(b=>b.classList.toggle('active',b.dataset.label===label));const m=payload[label].matrix;document.getElementById('title').innerHTML='<h3>Transición al horizonte de '+label+'</h3><p>Las cuatro flechas se recalculan para el mismo punto-campaña.</p>';document.getElementById('p00').textContent='0 → 0: '+pct(m[0][0]);document.getElementById('p01').textContent='0 → 1: '+pct(m[0][1]);document.getElementById('p10').textContent='1 → 0: '+pct(m[1][0]);document.getElementById('p11').textContent='1 → 1: '+pct(m[1][1]);document.getElementById('m11').textContent=pct(m[1][1]);document.getElementById('m01').textContent=pct(m[0][1]);document.getElementById('mem').textContent=pct(m[1][1]-m[0][1])}labels.forEach((label,i)=>{const b=document.createElement('button');b.textContent=label;b.dataset.label=label;b.onclick=()=>render(label);buttons.appendChild(b)});render(labels[0]);</script></body></html>
